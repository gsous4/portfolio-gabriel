name: Deploy Portfolio

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v3

      - name: Buildar imagem Docker
        run: docker build -t portfolio-gabriel .

      - name: Confirmar build
        run: echo "Portfolio buildado com sucesso!"